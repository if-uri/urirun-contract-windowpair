# Dwa wdrożone pakiety różnych URI + orchestrator-brama, jeden współdzielony contracts.json.
# `docker compose up --build --abort-on-container-exit --exit-code-from orchestrator`
# → orchestrator napędza wymianę po sieci i ZWRACA kod CI (0/1).
services:
  producer:
    build: { context: ., dockerfile: packages/producer/Dockerfile }
    environment: { PORT: "8801", CONTRACTS: /app/contracts.json }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8801/health')"]
      interval: 3s
      timeout: 2s
      retries: 10

  consumer:
    build: { context: ., dockerfile: packages/consumer/Dockerfile }
    environment: { PORT: "8802", CONTRACTS: /app/contracts.json }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8802/health')"]
      interval: 3s
      timeout: 2s
      retries: 10

  consumer-go:
    build: { context: ., dockerfile: packages/consumer-go/Dockerfile }
    environment: { PORT: "8803", CONTRACTS: /app/contracts.json }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8803/health')"]
      interval: 3s
      timeout: 2s
      retries: 10

  orchestrator:
    build: { context: ., dockerfile: orchestrator/Dockerfile }
    environment:
      PRODUCER_URL: http://producer:8801
      CONSUMER_URL: http://consumer:8802
      CONSUMER_GO_URL: http://consumer-go:8803
      CONTRACTS: /app/contracts.json
    depends_on:
      producer: { condition: service_healthy }
      consumer: { condition: service_healthy }
      consumer-go: { condition: service_healthy }
