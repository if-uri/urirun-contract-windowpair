name: contract
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install "urirun-contract @ git+https://github.com/if-uri/urirun-contract.git"

      - name: kontrakt konformuje (efekt, wzajemny inverse, przykłady)
        run: python ci/nl_to_contract.py --validate contracts.json

      - name: brak dryfu między kontraktem a wygenerowanym kodem
        run: python ci/regen_check.py

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: pip install "urirun-contract @ git+https://github.com/if-uri/urirun-contract.git"

      - name: start all services + orchestrate
        run: |
          (cd packages/consumer-go && go build -o /tmp/consumer-go .)
          PORT=8801 CONTRACTS=$GITHUB_WORKSPACE/contracts.json python packages/producer/service.py &>/tmp/producer.log &
          PORT=8802 CONTRACTS=$GITHUB_WORKSPACE/contracts.json python packages/consumer/service.py &>/tmp/consumer.log &
          PORT=8803 CONTRACTS=$GITHUB_WORKSPACE/contracts.json /tmp/consumer-go &>/tmp/go.log &
          CONTRACTS=$GITHUB_WORKSPACE/contracts.json CONSUMER_GO_URL=http://localhost:8803 \
            python orchestrator/drive.py || { echo "--- go.log ---"; cat /tmp/go.log; exit 1; }
